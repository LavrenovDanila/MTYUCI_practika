<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История запросов</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Bootstrap уже подключён в base.html, но если нет, добавьте: -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"> -->
</head>
<body>
    <div class="container">
        <h1>История обработанных изображений</h1>
        {% if rows %}
        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Время</th>
                        <th>Исходный файл</th>
                        <th>Пустых стульев</th>
                        <th>Людей</th>
                        <th>Заполненность</th>
                        <th>Результат</th>
                        <th>PDF-отчёт</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in rows %}
                    <tr>
                        <td>{{ row[0] }}</td>
                        <td>{{ row[1] }}</td>
                        <td>{{ row[2] }}</td>
                        <td>{{ row[3] }}</td>
                        <td>{{ row[4] }}%</td>
                        <td><img src="/static/{{ row[5] }}" alt="Результат" style="max-height:60px; max-width:100px;"></td>
                        <td><a class="btn-pdf" href="/report/{{ row[6] }}">Скачать PDF</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <p>История пуста.</p>
        {% endif %}
        <a class="nav-link back-link" href="/">Назад</a>
    </div>
</body>
</html>
