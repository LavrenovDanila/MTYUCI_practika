<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История запросов</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>История обработанных изображений</h1>
        {% if rows %}
        <table>
            <thead>
                <tr>
                    <th>Время</th>
                    <th>Исходный файл</th>
                    <th>Количество стульев</th>
                    <th>Результат</th>
                    <th>PDF-отчёт</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td><img src="/static/{{ row[3] }}" alt="Результат" style="max-height:60px;"></td>
                    <td><a class="btn-pdf" href="/report/{{ row[4] }}">Скачать PDF</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p>История пуста.</p>
        {% endif %}
        <a class="nav-link back-link" href="/">Назад</a>
    </div>
</body>
</html>
