version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: recipe_user
      POSTGRES_PASSWORD: recipe_pass
      POSTGRES_DB: recipe_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipe_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://recipe_user:recipe_pass@db:5432/recipe_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python run.py

volumes:
  postgres_data:
